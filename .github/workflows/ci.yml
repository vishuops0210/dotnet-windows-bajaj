name: .NET 4.7 (Windows) CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
      - uat

jobs:
  dotnet-ci:
    uses: vishuops0210/shared-repo/.github/workflows/ci-dotnet.yml@main
    with:
    
      version: 'v1.0.0'
      sonar-project-key: 'bajaj-demo-dotnet47'
      sonar-args: '/d:sonar.cs.vscoveragexml.reportsPaths=**/TestResults/**/*.xml'
      artifact-name: 'bajaj-demo-dotnet47'
      s3-bucket-name: 'my-bajaj-artifacts-bucket'
      install-command: 'nuget restore App.csproj'
      build-command: 'msbuild App.csproj /p:Configuration=Release'
      test-command: 'Write-Host "No tests configured"'
      package-command: |
        if (Test-Path "bin\Release") {
          Compress-Archive -Path bin\Release\* -DestinationPath deployment.zip
        } else {
          # Fallback if no Release folder is found
          Compress-Archive -Path * -DestinationPath deployment.zip
        }
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}